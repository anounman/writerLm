services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: writerlm-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to the app-owned Neon Postgres connection string}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?Set CLERK_SECRET_KEY from Clerk}
      CLERK_JWT_ISSUER: ${CLERK_JWT_ISSUER:-}
      CLERK_JWT_VERIFY_TIME: ${CLERK_JWT_VERIFY_TIME:-1}
      CLERK_JWT_LEEWAY_SECONDS: ${CLERK_JWT_LEEWAY_SECONDS:-300}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Set APP_ENCRYPTION_KEY to a Fernet key and keep it stable}
      JWT_SECRET: ${JWT_SECRET:-}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:?Set APP_CORS_ORIGINS to your Vercel frontend URL}
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      PLANNER_GOOGLE_MODEL: ${PLANNER_GOOGLE_MODEL:-gemini-2.5-flash-lite}
      RESEARCHER_GOOGLE_MODEL: ${RESEARCHER_GOOGLE_MODEL:-gemini-2.5-flash-lite}
      NOTES_GOOGLE_MODEL: ${NOTES_GOOGLE_MODEL:-gemini-2.5-flash-lite}
      WRITER_GOOGLE_MODEL: ${WRITER_GOOGLE_MODEL:-gemini-2.5-flash-lite}
      REVIEWER_GOOGLE_MODEL: ${REVIEWER_GOOGLE_MODEL:-gemini-2.5-flash-lite}
      PLANNER_GROQ_MODEL: ${PLANNER_GROQ_MODEL:-openai/gpt-oss-120b}
      RESEARCHER_GROQ_MODEL: ${RESEARCHER_GROQ_MODEL:-openai/gpt-oss-120b}
      NOTES_GROQ_MODEL: ${NOTES_GROQ_MODEL:-llama-3.3-70b-versatile}
      WRITER_GROQ_MODEL: ${WRITER_GROQ_MODEL:-llama-3.3-70b-versatile}
      REVIEWER_GROQ_MODEL: ${REVIEWER_GROQ_MODEL:-openai/gpt-oss-120b}
      WRITERLM_STRICT_PROVIDER_MODELS: ${WRITERLM_STRICT_PROVIDER_MODELS:-1}
      LLM_HTTP_TRUST_ENV: ${LLM_HTTP_TRUST_ENV:-0}
      WRITERLM_COMPILE_LATEX: ${WRITERLM_COMPILE_LATEX:-1}
      WRITERLM_STRICT_LATEX_COMPILE: ${WRITERLM_STRICT_LATEX_COMPILE:-0}
      LATEX_ENGINE: ${LATEX_ENGINE:-pdflatex}
      WRITERLM_UPLOAD_STAGING: /app/.cache/uploads
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - writerlm_runs:/app/runs
      - writerlm_uploads:/app/.cache/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  writerlm_runs:
  writerlm_uploads:
