services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: writerlm:latest
    env_file:
      - .env
    environment:
      WRITERLM_COMPILE_LATEX: "1"
      WRITERLM_STRICT_LATEX_COMPILE: "0"
      LATEX_ENGINE: "pdflatex"
      APP_CORS_ORIGINS: "http://localhost:8080,http://localhost:5173"
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8000:8000"
    command:
      - uvicorn
      - web.backend.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile
    image: writerlm-studio:latest
    depends_on:
      - backend
    ports:
      - "8080:80"

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: writerlm:latest
    env_file:
      - .env
    environment:
      WRITERLM_COMPILE_LATEX: "1"
      WRITERLM_STRICT_LATEX_COMPILE: "0"
      LATEX_ENGINE: "pdflatex"
    volumes:
      - .:/app
    working_dir: /app
    command:
      - python
      - orchestration/run_full_pipeline.py

  compile:
    image: writerlm:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      WRITERLM_COMPILE_LATEX: "1"
      WRITERLM_STRICT_LATEX_COMPILE: "0"
      LATEX_ENGINE: "pdflatex"
    volumes:
      - .:/app
    working_dir: /app
    command:
      - python
      - orchestration/run_latex_compile.py
      - --tex
      - outputs/book.tex
      - --strict

  assembler:
    image: writerlm:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      WRITERLM_COMPILE_LATEX: "1"
      WRITERLM_STRICT_LATEX_COMPILE: "0"
      LATEX_ENGINE: "pdflatex"
    volumes:
      - .:/app
    working_dir: /app
    command:
      - python
      - orchestration/run_assembler_only.py
