services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: writerlm:latest
    env_file:
      - .env
    environment:
      WRITERLM_COMPILE_LATEX: "1"
      WRITERLM_STRICT_LATEX_COMPILE: "0"
      LATEX_ENGINE: "pdflatex"
    volumes:
      - .:/app
    working_dir: /app
    command:
      - python
      - orchestration/run_full_pipeline.py

  compile:
    image: writerlm:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      WRITERLM_COMPILE_LATEX: "1"
      WRITERLM_STRICT_LATEX_COMPILE: "0"
      LATEX_ENGINE: "pdflatex"
    volumes:
      - .:/app
    working_dir: /app
    command:
      - python
      - orchestration/run_latex_compile.py
      - --tex
      - outputs/book.tex
      - --strict

  assembler:
    image: writerlm:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      WRITERLM_COMPILE_LATEX: "1"
      WRITERLM_STRICT_LATEX_COMPILE: "0"
      LATEX_ENGINE: "pdflatex"
    volumes:
      - .:/app
    working_dir: /app
    command:
      - python
      - orchestration/run_assembler_only.py
